{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold mb-2">Election Results</h1>
        <h2 class="text-2xl text-blue-600">{{ election.title }}</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        {% for question in election.questions %}
        <div class="card">
            <h3 class="text-xl font-bold mb-4 text-center">{{ question.text }}</h3>
            <canvas id="chart-{{ question.id }}" width="400" height="400"></canvas>
            <script>
                new Chart(document.getElementById('chart-{{ question.id }}'), {
                    type: 'pie',
                    data: {
                        labels: [{% for option in question.options %}"{{ option.name }}",{% endfor %}],
                        datasets: [{
                            data: [{% for option in question.options %}{{ option.votes }},{% endfor %}],
                            backgroundColor: [
                                '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            </script>
            <div class="mt-6">
                <table class="w-full">
                    {% for option in question.options %}
                    <tr class="border-t">
                        <td class="py-2">{{ option.name }}</td>
                        <td class="py-2 text-right font-bold">{{ option.votes }} votes</td>
                    </tr>
                    {% endfor %}
                </table>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="text-center mt-12">
        <a href="/" class="btn-secondary">Return Home</a>
    </div>
</div>
{% endblock %}
