{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h1 class="text-4xl font-bold mb-2">{{ election.title }}</h1>
        <p class="text-gray-600">{{ election.description }}</p>
    </div>

    <form action="/vote/{{ election.id }}/submit" method="POST">
        <input type="hidden" name="voter_id" value="{{ voter_id }}">
        <input type="hidden" name="voter_key" value="{{ voter_key }}">
        
        {% for question in election.questions %}
        <div class="card mb-6">
            <h2 class="text-xl font-bold mb-4">{{ question.text }}</h2>
            <div class="space-y-3">
                {% for option in question.options %}
                <label class="flex items-center p-4 border rounded hover:bg-blue-50 cursor-pointer transition">
                    <input type="radio" name="question_{{ question.id }}" value="{{ option.id }}" required class="h-5 w-5 text-blue-600">
                    <span class="ml-3 font-semibold text-lg">{{ option.name }}</span>
                </label>
                {% endfor %}
            </div>
        </div>
        {% endfor %}

        <div class="flex justify-center py-8">
            <button type="submit" class="btn-primary text-xl px-12 py-4 shadow-xl transform hover:scale-105 transition">
                Submit My Ballot
            </button>
        </div>
    </form>
</div>
{% endblock %}
